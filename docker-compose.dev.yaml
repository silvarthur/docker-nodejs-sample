services:
  app:
    build:
      context: .
      target: dev
    ports:
      - "3000:3000"
      - "5173:5173"
      - "9230:9230"
    environment:
      NODE_ENV: development
      POSTGRES_HOST: postgres
      POSTGRES_USER: todoapp
      POSTGRES_PASSWORD: todoapp_password
      POSTGRES_DB: todoapp
    volumes:
      - .:/app
      - /app/node_modules
